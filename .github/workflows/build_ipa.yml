name: Build Debug IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    env:
      UPLOAD_IPA: ${{ vars.UPLOAD_IPA || 'true' }}

    steps:
      - name: 1. Fetch Source Code
        uses: actions/checkout@v6

      - name: 2. Configure Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      - name: 3. Compile Project Archive
        run: |
          # GitHub's Xcode 26 runner currently fails while thinning app resources.
          # Keep repository assets intact, but skip CI-only asset catalog compilation for unsigned IPA packaging.
          rm -rf StikDebug/StikDebug.icon
          mv StikDebug/Assets.xcassets "$RUNNER_TEMP/Assets.xcassets"

          xcodebuild clean archive \
            -project StikDebug.xcodeproj \
            -scheme "StikDebug" \
            -configuration Debug \
            -archivePath build/StikDebug.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            IPHONEOS_DEPLOYMENT_TARGET=17.4

      - name: 4. Package .app into .ipa
        run: |
          cp -R build/StikDebug.xcarchive/Products/Applications/StikDebug.app .
          ICON_SOURCE="$RUNNER_TEMP/Assets.xcassets/StikDebug.imageset/StikDebug New-iOS-Default-1024x1024@1x.png"
          INFO_PLIST="StikDebug.app/Info.plist"

          cp "$ICON_SOURCE" StikDebug.app/StikDebug.png
          sips -z 120 120 "$ICON_SOURCE" --out StikDebug.app/AppIcon60x60@2x.png
          sips -z 180 180 "$ICON_SOURCE" --out StikDebug.app/AppIcon60x60@3x.png
          sips -z 152 152 "$ICON_SOURCE" --out StikDebug.app/AppIcon76x76@2x.png
          sips -z 167 167 "$ICON_SOURCE" --out StikDebug.app/AppIcon83.5x83.5@2x.png

          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$INFO_PLIST" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$INFO_PLIST" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons~ipad" "$INFO_PLIST" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconFiles" "$INFO_PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFiles array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFiles:0 string AppIcon60x60" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:UIPrerenderedIcon bool false" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconFiles array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconFiles:1 string AppIcon76x76" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconFiles:2 string AppIcon83.5x83.5" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:UIPrerenderedIcon bool false" "$INFO_PLIST"

          mkdir -p StikDebug.app/DDI
          curl -L --fail --retry 3 --output StikDebug.app/DDI/BuildManifest.plist "https://github.com/doronz88/DeveloperDiskImage/raw/refs/heads/main/PersonalizedImages/Xcode_iOS_DDI_Personalized/BuildManifest.plist"
          curl -L --fail --retry 3 --output StikDebug.app/DDI/Image.dmg "https://github.com/doronz88/DeveloperDiskImage/raw/refs/heads/main/PersonalizedImages/Xcode_iOS_DDI_Personalized/Image.dmg"
          curl -L --fail --retry 3 --output StikDebug.app/DDI/Image.dmg.trustcache "https://github.com/doronz88/DeveloperDiskImage/raw/refs/heads/main/PersonalizedImages/Xcode_iOS_DDI_Personalized/Image.dmg.trustcache"
          mkdir -p Payload
          cp -R StikDebug.app Payload/
          zip -r StikDebug.ipa Payload
          rm -rf Payload StikDebug.app

      - name: 5. Store IPA as Workflow Artifact
        if: env.UPLOAD_IPA == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: StikDebug-Debug.ipa
          path: StikDebug.ipa
          retention-days: 90
